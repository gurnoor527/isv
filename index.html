<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VEX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: #000;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    .liquid-glass {
      background: rgba(0, 0, 0, 0.4);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }

    .liquid-glass::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.1) 20%,
        rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.1) 80%, rgba(255,255,255,0.3) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* Video placeholder */
    .video-placeholder {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #0a0a0a 0%, #111 40%, #0d0d0d 100%);
      overflow: hidden;
    }
    .video-placeholder::after {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(ellipse 80% 60% at 70% 40%, rgba(255,255,255,0.03) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 20% 80%, rgba(255,255,255,0.02) 0%, transparent 50%);
    }
    /* subtle scanline texture */
    .video-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.008) 2px,
        rgba(255,255,255,0.008) 4px
      );
      pointer-events: none;
    }

    .video-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.15);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: center;
      pointer-events: none;
      border: 1px solid rgba(255,255,255,0.06);
      padding: 12px 20px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

const { useState, useEffect } = React;

function FadeIn({ children, delay = 0, duration = 1000, className = '' }) {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const t = setTimeout(() => setVisible(true), delay);
    return () => clearTimeout(t);
  }, [delay]);
  return (
    <div
      className={`transition-opacity ${className}`}
      style={{
        opacity: visible ? 1 : 0,
        transitionDuration: `${duration}ms`
      }}>
      
          {children}
        </div>);

}

function AnimatedHeading({ text, className = '', style = {} }) {
  const charDelay = 30;
  const initialDelay = 200;
  const [animated, setAnimated] = useState(false);

  useEffect(() => {
    const t = setTimeout(() => setAnimated(true), initialDelay);
    return () => clearTimeout(t);
  }, []);

  const lines = text.split('\n');

  return (
    <h1 className={className} style={style}>
          {lines.map((line, lineIndex) => {
        const chars = line.split('');
        const prevLineLength = lines.
        slice(0, lineIndex).
        reduce((acc, l) => acc + l.length, 0);
        return (
          <span key={lineIndex} style={{ display: 'block' }}>
                {chars.map((char, charIndex) => {
              const globalIndex = prevLineLength + charIndex;
              const delay = globalIndex * charDelay;
              return (
                <span
                  key={charIndex}
                  style={{
                    display: 'inline-block',
                    opacity: animated ? 1 : 0,
                    transform: animated ? 'translateX(0)' : 'translateX(-18px)',
                    transition: `opacity 500ms ease ${delay}ms, transform 500ms ease ${delay}ms`
                  }}>
                  
                      {char === ' ' ? '\u00A0' : char}
                    </span>);

            })}
              </span>);

      })}
        </h1>);

}

function App() {
  return (
    <div style={{ position: 'relative', width: '100vw', height: '100vh', display: 'flex', flexDirection: 'column' }}>
          {/* Background video */}
          <video
            autoPlay
            loop
            muted
            playsInline
            style={{
              position: 'absolute',
              inset: 0,
              width: '100%',
              height: '100%',
              objectFit: 'cover',
            }}
          >
            <source src="https://res.cloudinary.com/douzkcq0n/video/upload/Animate_video_add_202604192255_xkpqqj.mp4" type="video/mp4" />
          </video>

          {/* Content layer */}
          <div style={{ position: 'relative', zIndex: 10, display: 'flex', flexDirection: 'column', height: '100vh' }}>
            {/* Navbar */}
            <div className="px-6 md:px-12 lg:px-16 pt-6">
              <nav className="liquid-glass rounded-xl px-4 py-2 flex items-center justify-between">
                {/* Logo */}
                <span className="text-2xl font-semibold tracking-tight text-white">ISV</span>

                {/* Center links */}
                <div className="hidden md:flex items-center gap-8">
                  {[
                    { label: 'Our Story', href: 'https://indiansiliconvalley.in/podcast-about' },
                    { label: 'Portfolio', href: 'https://indiansiliconvalley.in/portfolio' },
                    { label: 'Blogs', href: 'https://indiansiliconvalley.in/blogs' },
                    { label: 'Podcast', href: 'https://www.youtube.com/@IndianSiliconValley' },
                  ].map(({ label, href }) =>
                    <a
                      key={label}
                      href={href}
                      className="text-sm text-white transition-colors duration-200 hover:text-gray-300"
                      style={{ textDecoration: 'none' }}>
                      {label}
                    </a>
                  )}
                </div>

                {/* CTA */}
                <button className="bg-white text-black px-6 py-2 rounded-lg text-sm font-medium hover:bg-gray-100 transition-colors duration-200">
                  Start a Chat
                </button>
              </nav>
            </div>

            {/* Hero content */}
            <div className="px-6 md:px-12 lg:px-16 flex-1 flex flex-col justify-end pb-12 lg:pb-16">
              <div className="lg:grid lg:grid-cols-2 lg:items-end">
                {/* Left column */}
                <div>
                  <AnimatedHeading
                text={"Shaping tomorrow\nwith vision and action."}
                className="text-4xl md:text-5xl lg:text-6xl xl:text-7xl font-normal text-white mb-4"
                style={{ letterSpacing: '-0.04em', lineHeight: 1.08 }} />
              

                  <FadeIn delay={800} duration={1000}>
                    <p className="text-base md:text-lg text-gray-300 mb-5">
                      We back visionaries and craft ventures that define what comes next.
                    </p>
                  </FadeIn>

                  <FadeIn delay={1200} duration={1000}>
                    <div className="flex flex-wrap gap-4">
                    
                    </div>
                  </FadeIn>
                </div>

                {/* Right column — tag */}
                <FadeIn delay={1400} duration={1000} className="flex items-end justify-start lg:justify-end mt-8 lg:mt-0">
                  <div className="liquid-glass border border-white/20 px-6 py-3 rounded-xl">
                    <span className="text-lg md:text-xl lg:text-2xl font-light text-white">
                      Investing. Building. Advisory.
                    </span>
                  </div>
                </FadeIn>
              </div>
            </div>
          </div>
        </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
